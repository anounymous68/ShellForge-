<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="ShellForge logo">
  <!-- Rounded dark charcoal tile -->
  <rect x="8" y="8" width="304" height="304" rx="36" ry="36" fill="#2a2a2a"/>

  <!-- Four-point spark -->
  <path fill="#3DDC97" d="M168 52 L176 92 L216 100 L176 108 L168 148 L160 108 L120 100 L160 92 Z"/>
  <!-- Ember dots -->
  <circle cx="198" cy="118" r="5" fill="#3DDC97"/>
  <circle cx="212" cy="132" r="3.5" fill="#3DDC97"/>

  <!-- Anvil (light gray) -->
  <!-- horn -->
  <ellipse cx="78" cy="168" rx="28" ry="16" fill="#D8D8D8" transform="rotate(-18 78 168)"/>
  <!-- top face -->
  <path fill="#E4E4E4" d="M70 168 L250 168 L242 198 L86 198 Z"/>
  <!-- waist / body -->
  <path fill="#C8C8C8" d="M110 198 L210 198 L198 248 L122 248 Z"/>
  <!-- foot -->
  <rect x="100" y="248" width="120" height="22" rx="3" fill="#D0D0D0"/>

  <!-- Terminal prompt on face -->
  <text x="96" y="190" fill="#1a1a1a" font-family="Consolas, 'Courier New', monospace"
        font-size="28" font-weight="700">&gt;_</text>

  <!-- Wordmark -->
  <text x="160" y="298" text-anchor="middle" fill="#3DDC97"
        font-family="Consolas, 'Courier New', monospace" font-size="28"
        font-weight="700" letter-spacing="4">SHELLFORGE</text>
</svg>
